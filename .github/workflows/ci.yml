name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  website-promise-consistency-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Promise consistency gate tests
        run: npx vitest run --config vitest.website.config.ts packages/website/tests/promise-consistency-gate.test.ts packages/website/tests/vision-coverage.test.ts

  test-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  mainline-contract-compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Mainline contract compatibility guard
        run: npm run test:contracts:mainline

  mainline-contract-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate contract drift report
        run: npm run contracts:drift:mainline

      - name: Upload contract drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mainline-contract-drift-report
          path: reports/mainline-contract-drift-report.md

  postgres-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gaialynk
          POSTGRES_PASSWORD: gaialynk
          POSTGRES_DB: gaialynk
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gaialynk -d gaialynk"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://gaialynk:gaialynk@localhost:5432/gaialynk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run db:migrate

      - name: PostgreSQL integration test
        run: npm run test:pg
